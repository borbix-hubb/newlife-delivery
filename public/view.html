<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NewLife Delivery — ดูข้อมูล</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --green:#16a34a;--green-l:#22c55e;--green-bg:#f0fdf4;--green-br:#bbf7d0;
  --inter:#0ea5e9;--inter-bg:#f0f9ff;--inter-br:#bae6fd;
  --dmk:#8b5cf6;--dmk-bg:#faf5ff;--dmk-br:#ddd6fe;
  --red:#ef4444;--red-bg:#fef2f2;--red-br:#fca5a5;
  --amber:#f59e0b;
  --tx:#0f172a;--tx2:#475569;--tx3:#94a3b8;
  --bd:#e2e8f0;--bg:#f8fafc;--wh:#fff;
  --sh:0 1px 3px rgba(0,0,0,.08);--r:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter','Noto Sans Thai',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;line-height:1.5}

.hdr{background:linear-gradient(135deg,#0f172a,#1e3a5f);padding:0 16px;height:54px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.hdr-logo{width:34px;height:34px;background:linear-gradient(135deg,var(--green),var(--green-l));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.hdr h1{font-size:15px;font-weight:700;color:#fff}
.hdr p{font-size:10px;color:rgba(255,255,255,.5)}
.view-badge{margin-left:auto;background:rgba(34,197,94,.15);color:#86efac;font-size:10px;font-weight:700;padding:4px 9px;border-radius:20px;border:1px solid rgba(34,197,94,.25)}

.page{max-width:860px;margin:0 auto;padding:14px 12px}

/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:10px;background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);padding:8px}
.tab{flex:1;padding:9px 10px;border-radius:10px;border:none;background:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--tx2);transition:.15s;white-space:nowrap}
.tab:hover{background:var(--bg)}
.tab:active{transform:scale(.96)}
.tab.active{background:var(--tx);color:#fff}
.tab.active.ti{background:linear-gradient(135deg,#0c4a6e,#0369a1)}
.tab.active.td{background:linear-gradient(135deg,#4c1d95,#6d28d9)}

/* DATE BAR */
.date-bar{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.date-bar label{font-size:12px;font-weight:600;color:var(--tx2);white-space:nowrap}
.date-input{border:1.5px solid var(--bd);border-radius:8px;padding:6px 10px;font-size:13px;font-family:inherit;color:var(--tx);background:var(--wh);width:148px}
.date-input:focus{outline:none;border-color:var(--green)}
.date-nav{display:flex;gap:5px}
.dnav{padding:6px 10px;border-radius:8px;border:1.5px solid var(--bd);background:var(--wh);font-size:12px;cursor:pointer;font-family:inherit;color:var(--tx2);transition:.15s}
.dnav:hover{background:#f1f5f9}.dnav:active{transform:scale(.96)}
.dnav.today{background:var(--green);color:#fff;border-color:var(--green)}

/* SEARCH */
.search-bar{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.search-icon{font-size:16px;flex-shrink:0;color:var(--tx3)}
.search-input{flex:1;border:none;font-size:13px;font-family:inherit;color:var(--tx);outline:none;background:transparent}
.search-input::placeholder{color:var(--tx3)}
.search-clear{background:none;border:none;cursor:pointer;color:var(--tx3);font-size:16px;padding:2px;display:none}
.search-clear.show{display:block}
.search-hint{font-size:10px;color:var(--tx3);white-space:nowrap}

/* SUMMARY */
.sumbar{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);padding:10px 14px;margin-bottom:10px;display:flex;align-items:stretch;flex-direction:column;gap:8px;flex-wrap:wrap}
.sum-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.si2{display:flex;align-items:center;gap:8px}
.sd2{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sl2{font-size:11px;color:var(--tx2)}
.sv{font-size:17px;font-weight:700}
.ssep{width:1px;height:30px;background:var(--bd)}
.sum-slot-row{display:flex;gap:8px;flex-wrap:wrap;border-top:1px dashed var(--bd);padding-top:8px}
.sum-slot-item{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:5px 10px}
.sum-slot-item.am{border-color:var(--amber);background:#fffbeb}
.sum-slot-item.pm{border-color:var(--dmk);background:#faf5ff}
.sum-slot-lbl{font-size:11px;color:var(--tx2)}
.sum-slot-val{font-size:14px;font-weight:700;color:var(--tx)}

/* SECTION */
.sec{margin-bottom:14px}
.sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pill{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700}
.pill-i{background:var(--inter-bg);color:#0369a1;border:1px solid var(--inter-br)}
.pill-d{background:var(--dmk-bg);color:#6d28d9;border:1px solid var(--dmk-br)}
.sec-ttl{font-size:14px;font-weight:700}
.sec-cnt{margin-left:auto;font-size:11px;color:var(--tx3);background:var(--bg);border:1px solid var(--bd);padding:3px 9px;border-radius:20px}

/* TABLE */
.card{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:380px}
thead.thi th{background:linear-gradient(90deg,#0c4a6e,#0369a1);color:#fff}
thead.thd th{background:linear-gradient(90deg,#4c1d95,#6d28d9);color:#fff}
th{padding:9px 10px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.3px;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid #f8fafc;vertical-align:middle;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8faff}
.tr-red td{background:#fff5f5 !important}
.td-no{width:36px;text-align:center;font-size:11px;font-weight:700;color:var(--tx3)}
.td-qty{width:60px;text-align:center;font-weight:700}
.td-inv{width:115px;font-family:monospace;font-size:12px;color:#0369a1}
.td-red{width:85px}
.badge-red{display:inline-block;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.hl{background:#fef08a;border-radius:3px;padding:0 2px}
.no-data{text-align:center;padding:44px 20px;color:var(--tx3);font-size:13px}

/* SLOT HEADER */
.slot-hdr{background:#f1f5f9;padding:7px 12px;font-size:11px;font-weight:700;color:var(--tx2);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:6px}
.slot-hdr.am{border-left:3px solid var(--amber)}
.slot-hdr.pm{border-left:3px solid var(--dmk)}

/* DATE GROUP (search mode) */
.date-grp-hdr{background:#f1f5f9;padding:7px 12px;font-size:11px;font-weight:700;color:var(--tx2);border-bottom:1px solid var(--bd);border-left:3px solid var(--inter);display:flex;align-items:center;gap:6px}
.date-grp-hdr.dmk{border-left-color:var(--dmk)}

/* LOADING */
.loading{text-align:center;padding:36px 20px;color:var(--tx3)}
.spin{display:inline-block;width:28px;height:28px;border:3px solid var(--bd);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* EMPTY */
.empty{text-align:center;padding:52px 20px;color:var(--tx3)}
.empty .ei{font-size:48px;margin-bottom:10px}
.empty h2{font-size:15px;font-weight:600;color:var(--tx2);margin-bottom:5px}
.empty p{font-size:12px;line-height:1.7}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:9px 18px;border-radius:100px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:999}
.toast.show{opacity:1}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-logo">📦</div>
  <div><h1>NewLife Delivery</h1><p>นิวไลฟ์ ฟาร์มา</p></div>
  <div class="view-badge">👁️ ดูข้อมูล</div>
</header>

<div class="page">

  <!-- DATE BAR -->
  <div class="date-bar">
    <label>📅</label>
    <input type="date" class="date-input" id="dateInput" onchange="loadDate(this.value)">
    <div class="date-nav">
      <button class="dnav" onclick="changeDate(-1)">◀</button>
      <button class="dnav today" onclick="goToday()">วันนี้</button>
      <button class="dnav" onclick="changeDate(1)">▶</button>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput" placeholder="ค้นหาข้ามทุกวัน — ชื่อร้าน, จังหวัด, Invoice..." oninput="onSearch(this.value)">
    <span class="search-hint" id="searchHint" style="display:none">ข้ามวัน</span>
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>

  <!-- CARRIER TABS -->
  <div class="tabs" id="tabs" style="display:none">
    <button class="tab active" id="tabAll" onclick="setTab('all')">📦 ทั้งหมด</button>
    <button class="tab" id="tabI" onclick="setTab('inter')">🚛 Inter</button>
    <button class="tab" id="tabD" onclick="setTab('dmk')">🚚 DMK</button>
  </div>

  <!-- SUMMARY -->
  <div class="sumbar" id="sumbar" style="display:none">
    <!-- inject by JS -->
  </div>

  <!-- Loading -->
  <div class="loading" id="loadingDiv" style="display:none">
    <div class="spin"></div><br>กำลังโหลด...
  </div>

  <!-- Inter -->
  <div class="sec" id="secI" style="display:none">
    <div class="sec-hdr">
      <span class="pill pill-i">🚛 Inter</span>
      <span class="sec-ttl">ใบนำส่ง Inter</span>
      <span class="sec-cnt" id="cntI"></span>
    </div>
    <div class="card" id="cardI"></div>
  </div>

  <!-- DMK -->
  <div class="sec" id="secD" style="display:none">
    <div class="sec-hdr">
      <span class="pill pill-d">🚚 DMK</span>
      <span class="sec-ttl">ใบนำส่ง DMK</span>
      <span class="sec-cnt" id="cntD"></span>
    </div>
    <div class="card" id="cardD"></div>
  </div>

  <!-- Empty -->
  <div class="empty" id="emp" style="display:none">
    <div class="ei">📋</div>
    <h2 id="empTitle">ไม่มีข้อมูลวันนี้</h2>
    <p id="empSub">ยังไม่มีการบันทึกใบนำส่งในวันที่นี้</p>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let allRows = { inter: [], dmk: [] }
let searchQ = ''
let searchMode = false
let searchResults = []
let activeTab = 'all'  // 'all' | 'inter' | 'dmk'
let sessionDate = new Date().toISOString().slice(0,10)
let searchTimer = null

document.getElementById('dateInput').value = sessionDate
loadDate(sessionDate)

function setTab(t) {
  activeTab = t
  if (searchMode && searchResults.length) renderSearchResults(searchResults, searchQ)
  else renderDay()
}

// ── DATE ──
async function loadDate(date) {
  searchMode = false; searchQ = ''
  document.getElementById('searchInput').value = ''
  document.getElementById('searchClear').className = 'search-clear'
  document.getElementById('searchHint').style.display = 'none'
  sessionDate = date
  document.getElementById('dateInput').value = date
  document.getElementById('loadingDiv').style.display = 'block'
  hideAll()
  try {
    const res = await fetch(`/api/rows?date=${date}`)
    const data = await res.json()
    if (data.ok) {
      allRows.inter = data.rows.filter(r => r.carrier === 'inter')
      allRows.dmk   = data.rows.filter(r => r.carrier === 'dmk')
      renderDay()
    }
  } catch(e) { showToast('❌ โหลดไม่ได้') }
  document.getElementById('loadingDiv').style.display = 'none'
}
function changeDate(d) {
  const dt = new Date(sessionDate); dt.setDate(dt.getDate()+d)
  loadDate(dt.toISOString().slice(0,10))
}
function goToday() { loadDate(new Date().toISOString().slice(0,10)) }

// ── SEARCH ──
function onSearch(q) {
  searchQ = q.trim()
  document.getElementById('searchClear').className = q ? 'search-clear show' : 'search-clear'
  document.getElementById('searchHint').style.display = q ? 'inline' : 'none'
  clearTimeout(searchTimer)
  if (!q) { searchMode=false; loadDate(sessionDate); return }
  searchTimer = setTimeout(() => doSearch(q), 400)
}
async function doSearch(q) {
  searchMode = true
  document.getElementById('loadingDiv').style.display = 'block'
  hideAll()
  try {
    const res = await fetch(`/api/rows/search?q=${encodeURIComponent(q)}`)
    const data = await res.json()
    if (data.ok) { searchResults = data.rows; renderSearchResults(data.rows, q) }
  } catch(e) { showToast('❌ ค้นหาไม่ได้') }
  document.getElementById('loadingDiv').style.display = 'none'
}
function clearSearch() {
  searchQ=''; searchMode=false
  document.getElementById('searchInput').value=''
  document.getElementById('searchClear').className='search-clear'
  document.getElementById('searchHint').style.display='none'
  loadDate(sessionDate)
}

// ── RENDER DAY ──
function renderDay() {
  const hi = allRows.inter.length > 0
  const hd = allRows.dmk.length > 0
  const hasAny = hi || hd

  // tabs — แสดงเฉพาะที่มีข้อมูล
  document.getElementById('tabs').style.display = hasAny ? 'flex' : 'none'
  document.getElementById('tabI').style.display = hi ? 'flex' : 'none'
  document.getElementById('tabD').style.display = hd ? 'flex' : 'none'

  // ถ้า tab ที่เลือกไม่มีข้อมูล → reset เป็น all
  if (activeTab==='inter' && !hi) activeTab='all'
  if (activeTab==='dmk' && !hd) activeTab='all'
  document.getElementById('tabAll').className = 'tab'+(activeTab==='all'?' active':'')
  document.getElementById('tabI').className   = 'tab ti'+(activeTab==='inter'?' active':'')
  document.getElementById('tabD').className   = 'tab td'+(activeTab==='dmk'?' active':'')

  // filter ตาม tab
  const showI = hasAny && (activeTab==='all' || activeTab==='inter') && hi
  const showD = hasAny && (activeTab==='all' || activeTab==='dmk') && hd

  document.getElementById('secI').style.display = showI ? 'block' : 'none'
  document.getElementById('secD').style.display = showD ? 'block' : 'none'
  document.getElementById('emp').style.display = !hasAny ? 'block' : 'none'

  // summary — แสดงเฉพาะ tab ที่เลือก
  const visRows = activeTab==='inter' ? allRows.inter : activeTab==='dmk' ? allRows.dmk : [...allRows.inter,...allRows.dmk]
  if (hasAny) updateSummary(visRows)
  else document.getElementById('sumbar').style.display='none'

  document.getElementById('cntI').textContent = allRows.inter.length+' รายการ'
  document.getElementById('cntD').textContent = allRows.dmk.length+' รายการ'
  if (showI) renderCardSlot('inter', allRows.inter, 'thi')
  if (showD) renderCardSlot('dmk', allRows.dmk, 'thd')
}

// ── RENDER CARD (with slot grouping) ──
function renderCardSlot(c, rowList, theadClass) {
  const card = document.getElementById(c==='inter'?'cardI':'cardD')
  card.innerHTML = ''
  if (!rowList.length) { card.innerHTML='<div class="no-data">ไม่มีข้อมูล</div>'; return }

  const hasSlot = rowList.some(r => r.session_slot)
  if (!hasSlot) {
    // ไม่มี slot — แสดงตารางเดียว
    const wrap=document.createElement('div');wrap.className='tbl-wrap'
    wrap.appendChild(buildTable(rowList, theadClass, 0))
    card.appendChild(wrap)
    return
  }

  // แยก slot
  let seq = 0
  ;[['เช้า','am'],['บ่าย','pm'],[null,'']].forEach(([slot, cls]) => {
    const g = rowList.filter(r => r.session_slot === slot)
    if (!g.length) return
    const hdr = document.createElement('div')
    if (slot==='เช้า') { hdr.className='slot-hdr am'; hdr.innerHTML=`☀️ ส่งตอนเช้า <span style="font-weight:400;color:var(--tx3)">(${g.length} รายการ)</span>` }
    else if (slot==='บ่าย') { hdr.className='slot-hdr pm'; hdr.innerHTML=`🌙 ส่งตอนบ่าย <span style="font-weight:400;color:var(--tx3)">(${g.length} รายการ)</span>` }
    else { hdr.className='slot-hdr'; hdr.innerHTML=`📦 รายการ <span style="font-weight:400;color:var(--tx3)">(${g.length} รายการ)</span>` }
    card.appendChild(hdr)
    const wrap=document.createElement('div');wrap.className='tbl-wrap'
    wrap.appendChild(buildTable(g, theadClass, seq))
    card.appendChild(wrap)
    seq += g.length
  })
}

// ── RENDER SEARCH RESULTS (cross-date) ──
function renderSearchResults(sRows, q) {
  if (!sRows.length) {
    document.getElementById('tabs').style.display='none'
    document.getElementById('emp').style.display='block'
    document.getElementById('empTitle').textContent='ไม่พบผลการค้นหา "'+q+'"'
    document.getElementById('empSub').textContent='ลองใช้คำค้นอื่น'
    return
  }
  const iRows = sRows.filter(r=>r.carrier==='inter')
  const dRows = sRows.filter(r=>r.carrier==='dmk')

  // แสดง tabs
  document.getElementById('tabs').style.display='flex'
  document.getElementById('tabI').style.display = iRows.length ? 'flex' : 'none'
  document.getElementById('tabD').style.display = dRows.length ? 'flex' : 'none'
  if (activeTab==='inter' && !iRows.length) activeTab='all'
  if (activeTab==='dmk' && !dRows.length) activeTab='all'
  document.getElementById('tabAll').className='tab'+(activeTab==='all'?' active':'')
  document.getElementById('tabI').className='tab ti'+(activeTab==='inter'?' active':'')
  document.getElementById('tabD').className='tab td'+(activeTab==='dmk'?' active':'')

  const visRows = activeTab==='inter' ? iRows : activeTab==='dmk' ? dRows : sRows
  updateSummary(visRows)
  document.getElementById('emp').style.display='none'

  const showI = (activeTab==='all'||activeTab==='inter') && iRows.length
  const showD = (activeTab==='all'||activeTab==='dmk') && dRows.length

  if (showI) {
    renderSearchCard('inter', iRows, 'thi')
    document.getElementById('secI').style.display='block'
    document.getElementById('cntI').textContent=iRows.length+' รายการ'
  } else { document.getElementById('secI').style.display='none' }

  if (showD) {
    renderSearchCard('dmk', dRows, 'thd')
    document.getElementById('secD').style.display='block'
    document.getElementById('cntD').textContent=dRows.length+' รายการ'
  } else { document.getElementById('secD').style.display='none' }
}

function renderSearchCard(c, rowList, theadClass) {
  const card = document.getElementById(c==='inter'?'cardI':'cardD')
  card.innerHTML = ''
  // group by date
  const byDate = {}
  rowList.forEach(r => {
    const dt = String(r.session_date).slice(0,10)
    if (!byDate[dt]) byDate[dt] = []
    byDate[dt].push(r)
  })
  let seq=0
  Object.keys(byDate).sort().reverse().forEach(dt => {
    const g=byDate[dt]
    const hdr=document.createElement('div')
    hdr.className='date-grp-hdr'+(c==='dmk'?' dmk':'')
    hdr.innerHTML=`📅 ${dt} <span style="font-weight:400;color:var(--tx3)">(${g.length} รายการ)</span>`
    card.appendChild(hdr)
    const wrap=document.createElement('div');wrap.className='tbl-wrap'
    wrap.appendChild(buildTable(g,theadClass,seq))
    card.appendChild(wrap)
    seq+=g.length
  })
}

// ── BUILD TABLE ──
function buildTable(rowList, theadClass, startSeq) {
  const q = searchQ.toLowerCase()
  const tbl=document.createElement('table')
  const thead=document.createElement('thead');thead.className=theadClass
  thead.innerHTML=`<tr><th class="td-no">#</th><th>ชื่อร้านค้า / รพ. / คลินิก</th><th style="width:90px">จังหวัด</th><th class="td-qty">กล่อง</th><th class="td-inv">Invoice</th><th class="td-red">คาดแดง</th></tr>`
  const tbody=document.createElement('tbody')
  rowList.forEach((r,i) => {
    const tr=document.createElement('tr')
    if (r.red_sticker) tr.className='tr-red'
    tr.innerHTML=`
      <td class="td-no">${startSeq+i+1}</td>
      <td style="font-weight:500">${hl(r.shop_name,q)||'-'}</td>
      <td style="color:var(--tx2)">${hl(r.province,q)||'-'}</td>
      <td class="td-qty">${r.quantity||0}</td>
      <td class="td-inv">${hl(r.invoice_no,q)||'-'}</td>
      <td class="td-red">${r.red_sticker?'<span class="badge-red">🔴 คาดแดง</span>':'-'}</td>
    `
    tbody.appendChild(tr)
  })
  tbl.appendChild(thead);tbl.appendChild(tbody)
  return tbl
}

function hl(text, q) {
  if (!q||!text) return text||''
  const e=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')
  return String(text).replace(new RegExp(`(${e})`,'gi'),'<span class="hl">$1</span>')
}

function updateSummary(rows) {
  const sumbar = document.getElementById('sumbar')
  const iRows = rows.filter(r=>r.carrier==='inter')
  const dRows = rows.filter(r=>r.carrier==='dmk')
  const totalBox = rows.reduce((s,r)=>s+(+r.quantity||0),0)
  const hasSlot = rows.some(r=>r.session_slot)

  // slot breakdown
  const amBox = rows.filter(r=>r.session_slot==='เช้า').reduce((s,r)=>s+(+r.quantity||0),0)
  const pmBox = rows.filter(r=>r.session_slot==='บ่าย').reduce((s,r)=>s+(+r.quantity||0),0)
  const amCnt = rows.filter(r=>r.session_slot==='เช้า').length
  const pmCnt = rows.filter(r=>r.session_slot==='บ่าย').length

  let html = `<div class="sum-row">
    <div class="si2"><div class="sd2" style="background:var(--inter)"></div><div><div class="sl2">Inter</div><div class="sv">${iRows.length}</div></div></div>
    <div class="ssep"></div>
    <div class="si2"><div class="sd2" style="background:var(--dmk)"></div><div><div class="sl2">DMK</div><div class="sv">${dRows.length}</div></div></div>
    <div class="ssep"></div>
    <div class="si2"><div class="sd2" style="background:var(--green)"></div><div><div class="sl2">รวมกล่อง</div><div class="sv">${totalBox}</div></div></div>
    <div class="ssep"></div>
    <div class="si2"><div class="sd2" style="background:var(--tx)"></div><div><div class="sl2">รายการ</div><div class="sv">${rows.length}</div></div></div>
  </div>`

  if (hasSlot) {
    html += `<div class="sum-slot-row">`
    if (amCnt) html += `<div class="sum-slot-item am"><span>☀️</span><div><div class="sum-slot-lbl">เช้า (${amCnt} ใบ)</div><div class="sum-slot-val">${amBox} กล่อง</div></div></div>`
    if (pmCnt) html += `<div class="sum-slot-item pm"><span>🌙</span><div><div class="sum-slot-lbl">บ่าย (${pmCnt} ใบ)</div><div class="sum-slot-val">${pmBox} กล่อง</div></div></div>`
    html += `</div>`
  }

  sumbar.innerHTML = html
  sumbar.style.display = 'flex'
}

function hideAll() {
  document.getElementById('tabs').style.display='none'
  document.getElementById('secI').style.display='none'
  document.getElementById('secD').style.display='none'
  document.getElementById('emp').style.display='none'
  document.getElementById('sumbar').style.display='none'
}

function showToast(msg) {
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show')
  setTimeout(()=>t.classList.remove('show'),2500)
}
