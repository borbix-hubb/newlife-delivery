<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NewLife Delivery</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --green:#16a34a;--green-l:#22c55e;--green-bg:#f0fdf4;--green-br:#bbf7d0;
  --inter:#0ea5e9;--inter-bg:#f0f9ff;--inter-br:#bae6fd;
  --dmk:#8b5cf6;--dmk-bg:#faf5ff;--dmk-br:#ddd6fe;
  --red:#ef4444;--red-bg:#fef2f2;--red-br:#fca5a5;
  --tx:#0f172a;--tx2:#475569;--tx3:#94a3b8;
  --bd:#e2e8f0;--bg:#f8fafc;--wh:#fff;
  --sh:0 1px 3px rgba(0,0,0,.08);--sh2:0 4px 20px rgba(0,0,0,.12);
  --r:14px;--rs:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter','Noto Sans Thai',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;line-height:1.5;padding-bottom:90px}

/* HEADER */
.hdr{background:var(--wh);border-bottom:1px solid var(--bd);padding:0 16px;height:54px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200;box-shadow:var(--sh)}
.hdr-logo{width:34px;height:34px;background:linear-gradient(135deg,var(--green),var(--green-l));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.hdr h1{font-size:15px;font-weight:700}
.hdr p{font-size:10px;color:var(--tx3)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.mode-badge{font-size:10px;font-weight:700;padding:4px 9px;border-radius:20px;white-space:nowrap}
.mode-admin{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
.mode-view{background:var(--green-bg);color:var(--green);border:1px solid var(--green-br)}
.mode-toggle{font-size:11px;color:var(--tx3);background:none;border:1px solid var(--bd);border-radius:8px;padding:4px 9px;cursor:pointer;font-family:inherit}

/* PAGE */
.page{max-width:860px;margin:0 auto;padding:14px 12px}

/* DATE BAR */
.date-bar{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.date-bar label{font-size:12px;font-weight:600;color:var(--tx2);white-space:nowrap}
.date-input{border:1.5px solid var(--bd);border-radius:8px;padding:7px 10px;font-size:13px;font-family:inherit;color:var(--tx);background:var(--wh);flex:1;min-width:140px;max-width:180px}
.date-input:focus{outline:none;border-color:var(--green)}
.date-nav{display:flex;gap:6px}
.dnav{padding:6px 12px;border-radius:8px;border:1.5px solid var(--bd);background:var(--wh);font-size:12px;cursor:pointer;font-family:inherit;color:var(--tx2);transition:.15s}
.dnav:hover{background:#f1f5f9}
.dnav.today{background:var(--green);color:#fff;border-color:var(--green)}

/* SEARCH */
.search-bar{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.search-icon{font-size:16px;flex-shrink:0;color:var(--tx3)}
.search-input{flex:1;border:none;font-size:13px;font-family:inherit;color:var(--tx);outline:none;background:transparent}
.search-input::placeholder{color:var(--tx3)}
.search-clear{background:none;border:none;cursor:pointer;color:var(--tx3);font-size:16px;padding:2px;display:none}
.search-clear.show{display:block}

/* SUMMARY */
.sumbar{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.si2{display:flex;align-items:center;gap:8px}
.sd2{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sl2{font-size:11px;color:var(--tx2)}
.sv{font-size:17px;font-weight:700}
.ssep{width:1px;height:30px;background:var(--bd)}

/* UPLOAD SECTION (admin only) */
.upload-sec{margin-bottom:14px}
.carrier-strip{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}
.cs{padding:11px 10px;border-radius:var(--rs);border:2.5px solid var(--bd);background:var(--wh);cursor:pointer;text-align:center;transition:.15s;font-family:inherit}
.cs:active{transform:scale(.97)}
.cs-ic{font-size:20px;margin-bottom:3px}
.cs-name{font-size:14px;font-weight:700;color:var(--tx)}
.cs-sub{font-size:10px;color:var(--tx3)}
.cs.si{border-color:var(--inter);background:var(--inter-bg)}.cs.si .cs-name{color:#0369a1}
.cs.sd{border-color:var(--dmk);background:var(--dmk-bg)}.cs.sd .cs-name{color:#6d28d9}
.action-bar{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.abtn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:16px 10px;border-radius:var(--r);border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:13px;transition:.15s}
.abtn:active{transform:scale(.95)}
.abtn-ic{font-size:28px;line-height:1}
.abtn-cam{background:linear-gradient(135deg,#0f172a,#1e40af);color:#fff;box-shadow:var(--sh2)}
.abtn-gal{background:var(--wh);color:var(--tx2);border:2px solid var(--bd)}
#fi,#ci{display:none}

/* PENDING */
.pending-wrap{display:none;background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px;margin-top:10px;box-shadow:var(--sh)}
.pending-wrap.show{display:block}
.pending-hd{font-size:12px;font-weight:700;color:var(--tx2);margin-bottom:9px;display:flex;justify-content:space-between}
.thumbs{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
.th{position:relative;width:58px;height:58px;border-radius:9px;overflow:hidden;border:2px solid var(--bd);flex-shrink:0}
.th img{width:100%;height:100%;object-fit:cover}
.th .tx-btn{position:absolute;top:2px;right:2px;width:15px;height:15px;background:var(--red);color:#fff;border:none;border-radius:50%;font-size:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}
.th-more{display:flex;align-items:center;justify-content:center;background:#f1f5f9;color:var(--tx2);font-size:11px;font-weight:700}
.scan-row{display:flex;gap:8px}

/* LOADING */
.load-card{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);padding:32px 20px;text-align:center;margin-bottom:14px}
.spin{display:inline-block;width:36px;height:36px;border:3px solid var(--bd);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.load-card h3{font-size:15px;font-weight:600;margin-bottom:3px}
.load-card p{font-size:12px;color:var(--tx3)}
.prog{margin-top:14px;height:5px;background:var(--bd);border-radius:3px;overflow:hidden}
.prog-f{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green),var(--green-l));transition:width .35s}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:var(--rs);font-size:13px;font-weight:600;border:none;cursor:pointer;font-family:inherit;transition:.15s;white-space:nowrap}
.btn:active{transform:scale(.96)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-dark{background:linear-gradient(135deg,#0f172a,#334155);color:#fff;flex:1;justify-content:center}
.btn-ghost{background:var(--wh);border:1.5px solid var(--bd);color:var(--tx2)}
.btn-green{background:linear-gradient(135deg,var(--green),var(--green-l));color:#fff}
.btn-inter{background:linear-gradient(135deg,#0369a1,var(--inter));color:#fff}
.btn-dmk{background:linear-gradient(135deg,#6d28d9,var(--dmk));color:#fff}
.btn-danger{background:var(--wh);border:1.5px solid var(--red-br);color:var(--red)}
.btn-full{width:100%;justify-content:center;padding:13px;font-size:14px}
.btn:hover:not(:disabled){filter:brightness(1.07)}

/* SECTION */
.sec{margin-bottom:14px}
.sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pill{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700}
.pill-i{background:var(--inter-bg);color:#0369a1;border:1px solid var(--inter-br)}
.pill-d{background:var(--dmk-bg);color:#6d28d9;border:1px solid var(--dmk-br)}
.sec-ttl{font-size:14px;font-weight:700}
.sec-cnt{margin-left:auto;font-size:11px;color:var(--tx3);background:var(--bg);border:1px solid var(--bd);padding:3px 9px;border-radius:20px}

/* TABLE */
.card{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse}
table.admin-tbl{min-width:600px}
table.view-tbl{min-width:400px}
thead.thi th{background:#0369a1;color:#fff}
thead.thd th{background:#6d28d9;color:#fff}
th{padding:9px 9px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.3px;white-space:nowrap}
td{padding:7px 9px;border-bottom:1px solid #f8fafc;vertical-align:middle;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbff}
/* view mode highlight search */
.hl{background:#fef9c3;border-radius:3px;padding:0 1px}
/* admin inline edit */
.cell-view{padding:4px 7px;border-radius:6px;cursor:pointer;font-size:12px;min-height:26px;display:flex;align-items:center;transition:.1s;word-break:break-word}
.cell-view:hover{background:#f1f5f9}
.cell-view.empty{color:var(--tx3);font-style:italic}
.cell input,.cell select{width:100%;border:1.5px solid var(--inter);border-radius:6px;padding:4px 7px;font-size:12px;font-family:inherit;background:var(--wh);color:var(--tx);display:none}
.cell input:focus,.cell select:focus{outline:none;border-color:var(--green)}
.cell.editing .cell-view{display:none}
.cell.editing input,.cell.editing select{display:block}
.badge-red{display:inline-block;background:var(--red-bg);color:var(--red);border:1px solid var(--red-br);font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.td-no{width:34px;text-align:center;font-size:11px;font-weight:700;color:var(--tx3)}
.td-qty{width:56px;text-align:center}
.td-inv{width:115px}
.td-red-v{width:80px}
.td-act{width:60px;text-align:center}
.act-btns{display:flex;gap:3px;justify-content:center}
.edit-btn{background:none;border:1.5px solid var(--bd);border-radius:6px;cursor:pointer;color:var(--tx2);font-size:11px;padding:3px 7px;font-family:inherit;font-weight:600;transition:.15s}
.edit-btn.save{border-color:var(--green);color:var(--green)}
.del-btn2{background:none;border:none;cursor:pointer;color:#fca5a5;font-size:16px;padding:3px;border-radius:6px;line-height:1}
.del-btn2:active{color:var(--red)}
.add-row-btn{width:100%;padding:8px;background:none;border:none;border-top:1px dashed var(--bd);cursor:pointer;font-size:12px;font-family:inherit}
.add-row-btn.ai{color:var(--inter)}.add-row-btn.ai:active{background:var(--inter-bg)}
.add-row-btn.ad{color:var(--dmk)}.add-row-btn.ad:active{background:var(--dmk-bg)}
.tbl-ft{padding:10px 12px;background:var(--bg);border-top:1px solid var(--bd);display:flex;gap:8px;flex-wrap:wrap}

/* VIEW mode table — clean */
.view-row-no{color:var(--tx3);font-size:11px;font-weight:700;text-align:center}
.view-shop{font-weight:500}
.view-province{color:var(--tx2)}
.view-qty{font-weight:700;color:var(--tx);text-align:center}
.view-inv{font-family:monospace;font-size:12px;color:#0369a1}
.no-data{text-align:center;padding:40px 20px;color:var(--tx3);font-size:13px}

/* DOCK */
.dock{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--bd);padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap;z-index:100;box-shadow:0 -2px 14px rgba(0,0,0,.08)}
.dock.hide{display:none}

/* EMPTY */
.empty{text-align:center;padding:52px 20px;color:var(--tx3)}
.empty .ei{font-size:48px;margin-bottom:10px}
.empty h2{font-size:15px;font-weight:600;color:var(--tx2);margin-bottom:5px}
.empty p{font-size:12px;line-height:1.7}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:9px 18px;border-radius:100px;font-size:13px;font-weight:500;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .25s;z-index:999;box-shadow:var(--sh2)}
.toast.show{opacity:1}

@media(min-width:601px){.action-bar{max-width:400px}.abtn{padding:18px 14px}.abtn-ic{font-size:32px}}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-logo">📦</div>
  <div><h1>NewLife Delivery</h1><p>นิวไลฟ์ ฟาร์มา</p></div>
  <div class="hdr-right">
    <span class="mode-badge mode-admin">✏️ Admin</span>
    <a href="/view" style="font-size:11px;color:var(--tx3);background:none;border:1px solid var(--bd);border-radius:8px;padding:4px 9px;text-decoration:none;white-space:nowrap">👁️ หน้าดู →</a>
  </div>
</header>

<div class="page">

  <!-- DATE BAR -->
  <div class="date-bar">
    <label>📅 วันที่:</label>
    <input type="date" class="date-input" id="dateInput" onchange="loadDate(this.value)">
    <div class="date-nav">
      <button class="dnav" onclick="changeDate(-1)">◀ เมื่อวาน</button>
      <button class="dnav today" onclick="goToday()">วันนี้</button>
      <button class="dnav" onclick="changeDate(1)">พรุ่งนี้ ▶</button>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput" placeholder="ค้นหาชื่อร้าน, จังหวัด, Invoice..." oninput="onSearch(this.value)">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>

  <!-- UPLOAD (admin only) -->
  <div class="upload-sec" id="uploadSec">
    <div class="carrier-strip">
      <button class="cs si" id="csI" onclick="setCarrier('inter')">
        <div class="cs-ic">🚛</div><div class="cs-name">Inter</div><div class="cs-sub">ขนส่ง Inter</div>
      </button>
      <button class="cs" id="csD" onclick="setCarrier('dmk')">
        <div class="cs-ic">🚚</div><div class="cs-name">DMK</div><div class="cs-sub">ขนส่ง DMK</div>
      </button>
    </div>
    <div class="action-bar">
      <button class="abtn abtn-cam" onclick="document.getElementById('ci').click()">
        <div class="abtn-ic">📷</div><span>ถ่ายรูป</span>
      </button>
      <button class="abtn abtn-gal" onclick="document.getElementById('fi').click()">
        <div class="abtn-ic">🖼️</div><span>เลือกจากแกลเลอรี่</span>
      </button>
    </div>
    <input type="file" id="ci" accept="image/*" capture="environment">
    <input type="file" id="fi" multiple accept="image/*">
    <div class="pending-wrap" id="pendingWrap">
      <div class="pending-hd"><span id="pendingLabel">📎 รูปที่รอสแกน</span><span id="pendingCount" style="font-size:11px;color:var(--tx3)"></span></div>
      <div class="thumbs" id="thumbs"></div>
      <div class="scan-row">
        <button class="btn btn-dark" id="btnScan" onclick="scan()">🔍 สแกนด้วย AI</button>
        <button class="btn btn-ghost" onclick="clearFiles()">✕</button>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div class="load-card" id="loadCard" style="display:none">
    <div class="spin"></div>
    <h3 id="loadT">กำลังอ่านใบนำส่ง...</h3>
    <p id="loadS">Claude AI กำลังประมวลผลรูปภาพ</p>
    <div class="prog"><div class="prog-f" id="pf" style="width:5%"></div></div>
  </div>

  <!-- Summary -->
  <div class="sumbar" id="sumbar" style="display:none">
    <div class="si2"><div class="sd2" style="background:var(--inter)"></div><div><div class="sl2">Inter</div><div class="sv" id="sv-i">0</div></div></div>
    <div class="ssep"></div>
    <div class="si2"><div class="sd2" style="background:var(--dmk)"></div><div><div class="sl2">DMK</div><div class="sv" id="sv-d">0</div></div></div>
    <div class="ssep"></div>
    <div class="si2"><div class="sd2" style="background:var(--green)"></div><div><div class="sl2">รวมกล่อง</div><div class="sv" id="sv-boxes">0</div></div></div>
    <div class="ssep"></div>
    <div class="si2"><div class="sd2" style="background:var(--tx)"></div><div><div class="sl2">รายการ</div><div class="sv" id="sv-a">0</div></div></div>
  </div>

  <!-- Inter section -->
  <div class="sec" id="secI" style="display:none">
    <div class="sec-hdr">
      <span class="pill pill-i">🚛 Inter</span>
      <span class="sec-ttl">ใบนำส่ง Inter</span>
      <span class="sec-cnt" id="cntI">0</span>
    </div>
    <div class="card" id="cardI"></div>
  </div>

  <!-- DMK section -->
  <div class="sec" id="secD" style="display:none">
    <div class="sec-hdr">
      <span class="pill pill-d">🚚 DMK</span>
      <span class="sec-ttl">ใบนำส่ง DMK</span>
      <span class="sec-cnt" id="cntD">0</span>
    </div>
    <div class="card" id="cardD"></div>
  </div>

  <!-- Empty -->
  <div class="empty" id="emp" style="display:none">
    <div class="ei">📋</div>
    <h2>ไม่มีข้อมูลวันนี้</h2>
    <p id="empDesc">เลือกขนส่ง → กด 📷 ถ่ายรูป → AI อ่านให้อัตโนมัติ</p>
  </div>

</div>

<!-- Export dock (admin) -->
<div class="dock hide" id="dock">
  <button class="btn btn-inter" id="dI" onclick="exportExcel('inter')" style="display:none">📥 Export Inter</button>
  <button class="btn btn-dmk" id="dD" onclick="exportExcel('dmk')" style="display:none">📥 Export DMK</button>
  <button class="btn btn-green btn-full" id="dA" onclick="exportBoth()" style="display:none">📥 Export ทั้งหมด</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let files = []
let carrier = 'inter'
let rows = { inter: [], dmk: [] }
let editingRow = { inter: -1, dmk: -1 }
let sessionDate = new Date().toISOString().slice(0, 10)
let searchQ = ''
let isAdmin = true  // เริ่มต้นเป็น admin mode

// ── INIT ──
document.getElementById('dateInput').value = sessionDate
loadDate(sessionDate)

// ── MODE TOGGLE ──
function toggleMode() {
  isAdmin = !isAdmin
  document.getElementById('modeBadge').className = 'mode-badge ' + (isAdmin ? 'mode-admin' : 'mode-view')
  document.getElementById('modeBadge').textContent = isAdmin ? '✏️ Admin' : '👁️ ดู'
  document.getElementById('modeToggleBtn').textContent = isAdmin ? 'เปลี่ยนเป็น 👁️ ดู' : 'เปลี่ยนเป็น ✏️ Admin'
  document.getElementById('uploadSec').style.display = isAdmin ? 'block' : 'none'
  document.getElementById('dock').className = isAdmin && hasData() ? 'dock' : 'dock hide'
  document.getElementById('empDesc').textContent = isAdmin
    ? 'เลือกขนส่ง → กด 📷 ถ่ายรูป → AI อ่านให้อัตโนมัติ'
    : 'ยังไม่มีข้อมูลในวันที่นี้'
  renderAll()
}

function hasData() {
  return rows.inter.length > 0 || rows.dmk.length > 0
}

// ── DATE ──
async function loadDate(date) {
  sessionDate = date
  document.getElementById('dateInput').value = date
  editingRow = { inter: -1, dmk: -1 }
  try {
    const res = await fetch(`/api/rows?date=${date}`)
    const data = await res.json()
    if (data.ok) {
      rows.inter = data.rows.filter(r => r.carrier === 'inter')
      rows.dmk   = data.rows.filter(r => r.carrier === 'dmk')
      renderAll()
    }
  } catch(e) {
    showToast('❌ โหลดข้อมูลไม่ได้')
  }
}

function changeDate(delta) {
  const d = new Date(sessionDate)
  d.setDate(d.getDate() + delta)
  loadDate(d.toISOString().slice(0, 10))
}

function goToday() {
  loadDate(new Date().toISOString().slice(0, 10))
}

// ── SEARCH ──
function onSearch(q) {
  searchQ = q.toLowerCase().trim()
  document.getElementById('searchClear').className = q ? 'search-clear show' : 'search-clear'
  renderAll()
}

function clearSearch() {
  searchQ = ''
  document.getElementById('searchInput').value = ''
  document.getElementById('searchClear').className = 'search-clear'
  renderAll()
}

function filterRows(r) {
  if (!searchQ) return r
  return r.filter(row =>
    (row.shop_name||'').toLowerCase().includes(searchQ) ||
    (row.province||'').toLowerCase().includes(searchQ) ||
    (row.invoice_no||'').toLowerCase().includes(searchQ)
  )
}

function highlight(text) {
  if (!searchQ || !text) return text || '-'
  const escaped = searchQ.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')
  return String(text).replace(new RegExp(`(${escaped})`, 'gi'), '<span class="hl">$1</span>')
}

// ── CARRIER ──
function setCarrier(c) {
  carrier = c
  document.getElementById('csI').className = 'cs' + (c==='inter' ? ' si' : '')
  document.getElementById('csD').className = 'cs' + (c==='dmk' ? ' sd' : '')
}

// ── FILES ──
document.getElementById('ci').addEventListener('change', e => {
  const f = [...e.target.files]; e.target.value = ''
  if (!f.length) return
  addFiles(f); scanFiles(f)
})
document.getElementById('fi').addEventListener('change', e => {
  const f = [...e.target.files]; e.target.value = ''
  if (!f.length) return
  addFiles(f)
  if (f.length === 1) scanFiles(f); else showPending()
})
document.addEventListener('dragover', e => e.preventDefault())
document.addEventListener('drop', e => {
  e.preventDefault()
  const imgs = [...e.dataTransfer.files].filter(f => f.type.startsWith('image/'))
  if (imgs.length) { addFiles(imgs); showPending() }
})

function addFiles(f) { files = [...files, ...f]; renderThumbs() }
function renderThumbs() {
  const c = document.getElementById('thumbs')
  c.innerHTML = ''
  files.slice(0,8).forEach((f,i) => {
    const url = URL.createObjectURL(f)
    const d = document.createElement('div'); d.className = 'th'
    d.innerHTML = `<img src="${url}" loading="lazy"><button class="tx-btn" onclick="rmF(${i})">×</button>`
    c.appendChild(d)
  })
  if (files.length > 8) {
    const m = document.createElement('div'); m.className = 'th th-more'
    m.textContent = `+${files.length-8}`; c.appendChild(m)
  }
  document.getElementById('pendingCount').textContent = `${files.length} รูป`
}
function showPending() {
  document.getElementById('pendingWrap').className = files.length ? 'pending-wrap show' : 'pending-wrap'
}
function rmF(i) { files.splice(i,1); renderThumbs(); showPending() }
function clearFiles() { files=[]; renderThumbs(); showPending() }

// ── SCAN ──
async function scan() { if (files.length) await scanFiles([...files]) }

async function scanFiles(fileList) {
  if (!fileList.length) return
  document.getElementById('btnScan').disabled = true
  document.getElementById('loadCard').style.display = 'block'
  document.getElementById('pendingWrap').className = 'pending-wrap'
  document.getElementById('loadT').textContent = `กำลังอ่าน ${fileList.length} ใบ (${carrier==='inter'?'Inter':'DMK'})...`
  document.getElementById('pf').style.width = '10%'

  const fd = new FormData()
  fileList.forEach(f => fd.append('images', f))
  fd.append('carrier', carrier)
  fd.append('session_date', sessionDate)

  try {
    document.getElementById('pf').style.width = '40%'
    const res = await fetch('/api/ocr', { method:'POST', body:fd })
    document.getElementById('pf').style.width = '88%'
    if (!res.ok) throw new Error(`Server ${res.status}`)
    const data = await res.json()
    document.getElementById('pf').style.width = '100%'
    if (!data.ok) throw new Error(data.error||'AI อ่านไม่สำเร็จ')

    rows[carrier] = [...rows[carrier], ...data.results]
    files = files.filter(f => !fileList.includes(f))
    renderThumbs()
    renderAll()
    showToast(`✅ บันทึก ${data.results.length} ใบ → ${carrier==='inter'?'Inter':'DMK'}`)
  } catch(e) {
    showToast('❌ ' + e.message)
    showPending()
  }
  document.getElementById('loadCard').style.display = 'none'
  document.getElementById('btnScan').disabled = false
}

// ── RENDER ALL ──
function renderAll() {
  const fi = filterRows(rows.inter)
  const fd = filterRows(rows.dmk)
  const hi = rows.inter.length > 0, hd = rows.dmk.length > 0
  const fhi = fi.length > 0, fhd = fd.length > 0

  document.getElementById('secI').style.display = hi ? 'block' : 'none'
  document.getElementById('secD').style.display = hd ? 'block' : 'none'
  document.getElementById('emp').style.display = (!hi && !hd) ? 'block' : 'none'
  document.getElementById('sumbar').style.display = (hi||hd) ? 'flex' : 'none'

  document.getElementById('sv-i').textContent = rows.inter.length
  document.getElementById('sv-d').textContent = rows.dmk.length
  document.getElementById('sv-a').textContent = rows.inter.length + rows.dmk.length
  const totalBoxes = [...rows.inter,...rows.dmk].reduce((s,r)=>s+(+r.quantity||0),0)
  document.getElementById('sv-boxes').textContent = totalBoxes

  document.getElementById('cntI').textContent = fi.length !== rows.inter.length ? `${fi.length}/${rows.inter.length} รายการ` : `${rows.inter.length} รายการ`
  document.getElementById('cntD').textContent = fd.length !== rows.dmk.length ? `${fd.length}/${rows.dmk.length} รายการ` : `${rows.dmk.length} รายการ`

  renderCard('inter', fi)
  renderCard('dmk', fd)

  // dock (admin only)
  if (isAdmin) {
    document.getElementById('dock').className = (hi||hd) ? 'dock' : 'dock hide'
    document.getElementById('dI').style.display = hi ? 'inline-flex' : 'none'
    document.getElementById('dD').style.display = hd ? 'inline-flex' : 'none'
    document.getElementById('dA').style.display = (hi&&hd) ? 'flex' : 'none'
  } else {
    document.getElementById('dock').className = 'dock hide'
  }
}

// ── RENDER CARD ──
function renderCard(c, filteredRows) {
  const card = document.getElementById(c==='inter'?'cardI':'cardD')
  const eRow = editingRow[c]

  if (!filteredRows.length) {
    card.innerHTML = `<div class="no-data">${searchQ ? '🔍 ไม่พบผลการค้นหา' : 'ไม่มีข้อมูล'}</div>`
    return
  }

  if (isAdmin) {
    // ADMIN TABLE
    card.innerHTML = ''
    const wrap = document.createElement('div'); wrap.className = 'tbl-wrap'
    const table = document.createElement('table'); table.className = 'admin-tbl'
    const thead = document.createElement('thead')
    thead.className = c==='inter'?'thi':'thd'
    thead.innerHTML = `<tr><th class="td-no">#</th><th>ชื่อ</th><th style="width:95px">จังหวัด</th><th class="td-qty">กล่อง</th><th class="td-inv">Invoice</th><th class="td-red-v">คาดแดง</th><th class="td-act"></th></tr>`
    const tbody = document.createElement('tbody')

    // หา index จริงใน rows[c] จาก filteredRows
    filteredRows.forEach((r) => {
      const realIdx = rows[c].indexOf(r)
      const ed = (realIdx === eRow)
      const tr = document.createElement('tr')
      const shopV = ed ? `<div class="cell editing"><input id="inp-shop-${c}-${realIdx}" value="${esc(r.shop_name)}" placeholder="ชื่อร้าน" oninput="rows['${c}'][${realIdx}].shop_name=this.value"></div>` : `<div class="cell"><div class="cell-view ${r.shop_name?'':'empty'}" onclick="startEdit('${c}',${realIdx})">${highlight(r.shop_name)||'<span style="color:var(--tx3)">-</span>'}</div></div>`
      const provV = ed ? `<div class="cell editing"><input value="${esc(r.province)}" placeholder="จังหวัด" oninput="rows['${c}'][${realIdx}].province=this.value"></div>` : `<div class="cell"><div class="cell-view ${r.province?'':'empty'}" onclick="startEdit('${c}',${realIdx})">${highlight(r.province)||'<span style="color:var(--tx3)">-</span>'}</div></div>`
      const qtyV = ed ? `<div class="cell editing"><input type="number" value="${r.quantity||0}" style="text-align:center" oninput="rows['${c}'][${realIdx}].quantity=+this.value"></div>` : `<div class="cell"><div class="cell-view" onclick="startEdit('${c}',${realIdx})" style="justify-content:center;font-weight:700">${r.quantity||0}</div></div>`
      const invV = ed ? `<div class="cell editing"><input value="${esc(r.invoice_no)}" placeholder="IV..." oninput="rows['${c}'][${realIdx}].invoice_no=this.value"></div>` : `<div class="cell"><div class="cell-view ${r.invoice_no?'':'empty'}" onclick="startEdit('${c}',${realIdx})">${highlight(r.invoice_no)||'<span style="color:var(--tx3)">-</span>'}</div></div>`
      const redV = ed ? `<div class="cell editing"><select onchange="rows['${c}'][${realIdx}].red_sticker=this.value==='red'"><option value="" ${!r.red_sticker?'selected':''}>-</option><option value="red" ${r.red_sticker?'selected':''}>🔴 คาดแดง</option></select></div>` : `<div class="cell"><div class="cell-view" onclick="startEdit('${c}',${realIdx})">${r.red_sticker?'<span class="badge-red">🔴 คาดแดง</span>':'<span style="color:var(--tx3)">-</span>'}</div></div>`
      const actV = ed ? `<div class="act-btns"><button class="edit-btn save" onclick="saveEdit('${c}',${realIdx})">✓</button></div>` : `<div class="act-btns"><button class="edit-btn" onclick="startEdit('${c}',${realIdx})">✏️</button><button class="del-btn2" onclick="delRow('${c}',${realIdx})">×</button></div>`
      tr.innerHTML = `<td class="td-no">${realIdx+1}</td><td>${shopV}</td><td>${provV}</td><td class="td-qty">${qtyV}</td><td class="td-inv">${invV}</td><td class="td-red-v">${redV}</td><td class="td-act">${actV}</td>`
      tbody.appendChild(tr)
    })

    table.appendChild(thead); table.appendChild(tbody); wrap.appendChild(table)
    const addBtn = document.createElement('button')
    addBtn.className = 'add-row-btn ' + (c==='inter'?'ai':'ad')
    addBtn.textContent = '＋ เพิ่มแถว'
    addBtn.onclick = () => addRow(c)
    wrap.appendChild(addBtn)
    card.appendChild(wrap)

    const ft = document.createElement('div'); ft.className = 'tbl-ft'
    ft.innerHTML = `<button class="btn btn-danger" onclick="clearRows('${c}')">🗑️ เคลียร์ ${c==='inter'?'Inter':'DMK'}</button>`
    card.appendChild(ft)

    if (eRow >= 0) setTimeout(() => document.getElementById(`inp-shop-${c}-${eRow}`)?.focus(), 40)

  } else {
    // VIEW TABLE — clean, no edit
    card.innerHTML = ''
    const wrap = document.createElement('div'); wrap.className = 'tbl-wrap'
    const table = document.createElement('table'); table.className = 'view-tbl'
    const thead = document.createElement('thead')
    thead.className = c==='inter'?'thi':'thd'
    thead.innerHTML = `<tr><th class="td-no">#</th><th>ชื่อร้านค้า / รพ. / คลินิก</th><th style="width:90px">จังหวัด</th><th style="width:55px;text-align:center">กล่อง</th><th style="width:110px">Invoice</th><th style="width:75px">คาดแดง</th></tr>`
    const tbody = document.createElement('tbody')

    filteredRows.forEach((r, i) => {
      const tr = document.createElement('tr')
      tr.innerHTML = `
        <td class="view-row-no">${rows[c].indexOf(r)+1}</td>
        <td class="view-shop">${highlight(r.shop_name)||'-'}</td>
        <td class="view-province">${highlight(r.province)||'-'}</td>
        <td class="view-qty">${r.quantity||0}</td>
        <td class="view-inv">${highlight(r.invoice_no)||'-'}</td>
        <td>${r.red_sticker?'<span class="badge-red">🔴 คาดแดง</span>':'-'}</td>
      `
      tbody.appendChild(tr)
    })

    table.appendChild(thead); table.appendChild(tbody); wrap.appendChild(table)
    card.appendChild(wrap)
  }
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;') }

// ── ADMIN ACTIONS ──
function startEdit(c, i) { editingRow[c] = i; renderCard(c, filterRows(rows[c])) }

async function saveEdit(c, i) {
  const r = rows[c][i]; editingRow[c] = -1; renderCard(c, filterRows(rows[c]))
  if (r.id) {
    try {
      await fetch(`/api/rows/${r.id}`, { method:'PUT', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ shop_name:r.shop_name, province:r.province, invoice_no:r.invoice_no, quantity:r.quantity, red_sticker:r.red_sticker }) })
    } catch(e) {}
  }
  showToast('✅ บันทึกแล้ว')
}

async function delRow(c, i) {
  const r = rows[c][i]
  rows[c].splice(i,1)
  if (editingRow[c] >= rows[c].length) editingRow[c] = -1
  renderAll()
  if (r.id) try { await fetch(`/api/rows/${r.id}`, { method:'DELETE' }) } catch(e) {}
}

async function addRow(c) {
  try {
    const res = await fetch('/api/rows', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ carrier:c, session_date:sessionDate, shop_name:'', province:'', invoice_no:'', quantity:0, red_sticker:false }) })
    const data = await res.json()
    rows[c].push(data.ok ? data.row : { shop_name:'', province:'', invoice_no:'', quantity:0, red_sticker:false })
  } catch(e) { rows[c].push({ shop_name:'', province:'', invoice_no:'', quantity:0, red_sticker:false }) }
  editingRow[c] = rows[c].length - 1
  renderAll()
}

async function clearRows(c) {
  if (!confirm(`เคลียร์ ${c==='inter'?'Inter':'DMK'} วันที่ ${sessionDate} ทั้งหมด?`)) return
  rows[c] = []; editingRow[c] = -1; renderAll()
  try { await fetch(`/api/rows?carrier=${c}&date=${sessionDate}`, { method:'DELETE' }) } catch(e) {}
  showToast('🗑️ เคลียร์แล้ว')
}

// ── EXPORT ──
async function exportExcel(c) { if (rows[c].length) await doExport(rows[c], c) }
async function exportBoth() {
  if (rows.inter.length) await doExport(rows.inter,'inter')
  if (rows.dmk.length) await doExport(rows.dmk,'dmk')
}
async function doExport(r, c) {
  try {
    const res = await fetch('/api/export', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({rows:r,carrier:c}) })
    if (!res.ok) throw new Error('export failed')
    const blob = await res.blob()
    const a = document.createElement('a')
    a.href = URL.createObjectURL(blob)
    a.download = `newlife_${c}_${sessionDate}.xlsx`
    a.click()
    showToast(`📥 Export ${c==='inter'?'Inter':'DMK'} สำเร็จ!`)
  } catch(e) { showToast('❌ ' + e.message) }
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg; t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 2800)
}
</script>
